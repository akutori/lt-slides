[general]
; 特になければ空でもOKですが、セクション名だけは必要です
features.conf は「ボタンがない電話機でも、ピポパ操作でサーバーに転送を命令できるようにするためのバックアップ」だと考えてください。

[featuremap]
; 通話中の操作コマンドを定義します
;blindxfer => #1    ; #1 を押すと「ブラインド転送（無条件転送）」
;atxfer => *2       ; *2 を押すと「アテンド転送（取次転送）」
;parkcall => #72    ; #72 を押すと「パーク保留」
;disconnect => ** ; ** を押すと通話を切断

; extensions.conf の例
; T : かけてきた人(外部など)に転送を許可する
; t : かけられた人(内線など)に転送を許可する
;exten => 201,1,Dial(PJSIP/201,30,Tt) ; <--- この "Tt" がないと #1 は効きません