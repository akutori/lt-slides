;================================ TRANSPORTS ==

[master-transport-udp](!)
type = transport
protocol = udp
bind = 0.0.0.0

; Our primary transport definition for UDP communication behind NAT.
[transport-udp-nat](master-transport-udp)

; NAT settings
; --- Asterisk コンテナ自身の IPのみをローカル扱いとする ---
; --- ゲートウェイや他ネットワークは NAT 対象とするため local_net には含めない ---
;local_netの指定は
;docker inspect <asteriskコンテナ名> | grep IPAddress
;ここで出てきたIPを local_net に書けば OK。
local_net = [mask]/32   ; Asterisk が「ローカルネットワーク」と判断する範囲
external_media_address = [mask]
external_signaling_address = [mask]
; 【最重要】ここが効いていないと保留・転送ができません
external_signaling_port = 6060

;linuxの場合はこちらを使ってもらう(dockerコンテナでnetwork_mode = host にしているので)
[transport-udp](master-transport-udp)
bind = 0.0.0.0:6060


;================================ CONFIG FOR SIP ITSP(Internet Telephony Service Provider) ==

;================================ ENDPOINT TEMPLATES ==

; ================================================================
; 共通テンプレート: base-endpoint
;末尾の (!) は「これはテンプレートですよ」という印です。
; ================================================================
[base-endpoint](!)
type = endpoint           ; オブジェクトの種類が「端末（エンドポイント）」であることを定義
context = Long-Distance   ; この端末から電話をかけた際、extensions.conf のどの行（文脈）から実行するか
dtmf_mode = rfc4733       ; プッシュ信号(トーン)の送り方。最も標準的な方式です
;dtmf_mode = inband        ;純粋に音を 出すだけの方式。相手が古い機器でRFC4733に対応していない場合の保険として、両方指定することもあります
device_state_busy_at = 1  ; 同時呼び出し・通話数を制限。1つ使っていたら「使用中(Busy)」にする

; --- 音声コーデックの設定 ---
; 一度全て禁止(!all)してから、優先順位の高い順に許可します
allow = !all              ; 全てのコーデックを一旦禁止
; microSIP のコーデックス設定は「g722 16kHz」
allow = g722              ; 高音質コーデック（利用可能なら優先）
;allow = ulaw              ; 標準的な電話音質（日本の公衆網などで一般的）
;allow = alaw              ; 低ビットレートコーデック（帯域が狭い回線向け）

; --- ID・認識に関する設定 ---
trust_id_outbound = yes   ; 端末から送られてくる発信者ID情報を信頼する設定

; ================================================================
; NAT・ネットワーク越えの重要設定
; 会社や自宅のルーター（NAT）の内側にある電話機を正しく動かすための設定です
; ================================================================

; --- 使用する通信路（トランスポート）の指定 ---
; 事前に [transport-udp-nat] などの名称で定義した設定を呼び出します
transport = transport-udp-nat ; 【最重要】NAT対応を有効にした通信設定を使用
;transport = transport-udp ; <--- linuxの場合はこちらを適用する

; --- メディア（音声データ）の経路制御 ---
direct_media = no         ; 音声データを端末同士で直接やり取りさせず、必ずAsteriskを経由させる
                          ; (NAT環境では直接送ろうとすると、ルーターに阻まれて無音になるため)

disable_direct_media_on_nat = yes ; NAT配下にいると判断された場合、direct_mediaを強制的に無効化

; --- パケットの送り先を補正する設定（NAT越えの三種の神器） ---
rewrite_contact = yes     ; 端末が通知してきたIPアドレスではなく、実際にパケットが届いた元の
                          ; IPアドレスとポート番号を返信先として上書き保存する（非常に重要）

rtp_symmetric = yes       ; 音声(RTP)を送ってきたのと同じポートに対して、音声を送り返す設定
                          ; これを yes にしないと、相手の声が聞こえない「片通話」の原因になります

force_rport = yes         ; SIPメッセージの返信先を、パケットの送信元ポートに強制する
                          ; ルーターがポートを変換している場合に必須の設定です

; --- その他 ---
ice_support = no          ; ICE(経路候補の中から最適な道を探す仕組み)をオフにします
                          ; シンプルなNAT設定の場合、ICEが変な経路を提案してトラブルになるのを防ぎます
; ----------------------------

[auth-userpass](!)
type = auth
auth_type = userpass

[aor-single-reg](!)
type = aor
max_contacts = 1
remove_existing = yes  ; 新しいログインが来たら、古い「幽霊接続」を自動で蹴り出す

;===========================
;  Endpoint テンプレート
;===========================
[endpoint-template](!,base-endpoint)
context=from-internal

;===========================
;  Auth テンプレート
;===========================
[auth-template](!,auth-userpass)

;===========================
;  AOR テンプレート
;===========================
[aor-template](!,aor-single-reg)

;================================ ENDPOINT DEFINITIONS ==

; テンプレートから新しい内線を追加
; PJSIP の内線は最低 3セクション必要
; PJSIP が AOR（連絡先管理）・AUTH（認証）・ENDPOINT（SIPエンドポイント） を分離して扱う設計
; endpoint = 内線の本体（コーデック、context、auth/aor の紐付け）
; auth = 認証情報（ユーザー名・パスワード）
; aor = 端末の登録先（Contact の管理）

; 100
[100](endpoint-template)
auth = 100
aors = 100
[100](auth-template)
password=pass100
username=100
[100](aor-template)

; 101
[101](endpoint-template)
auth = 101
aors = 101
[101](auth-template)
password=pass101
username=101
[101](aor-template)

; 102
[102](endpoint-template)
auth = 102
aors = 102
[102](auth-template)
password=pass102
username=102
[102](aor-template)